function initRecaptcha(){
  if(!firebaseReady)return;
  try{
    if(recaptchaVerifier){try{recaptchaVerifier.clear();}catch(_){}}
    recaptchaVerifier=new firebase.auth.RecaptchaVerifier('recaptcha-container',{
      size:'invisible',
      callback:()=>{}
    });
  }catch(e){console.log('reCAPTCHA:',e.message);}
}

async function sendOTP(){
  if(!firebaseReady){showPhoneErr(' Firebase Config ⚙️');return;}
  const code=document.getElementById('country-code').value;
  const num=document.getElementById('auth-phone').value.trim().replace(/^0/,'');
  const full=code+num;
  if(!num||num.length<7){showPhoneErr('أدخل رقم هاتف صحيح');return;}
  setAuthLoading(true);
  try{
    if(!recaptchaVerifier)initRecaptcha();
    confirmationResult=await auth.signInWithPhoneNumber(full,recaptchaVerifier);
    document.getElementById('phone-step-1').style.display='none';
    document.getElementById('phone-step-2').style.display='flex';
  }catch(e){
    showPhoneErr(firebaseErrMsg(e.code));
    try{recaptchaVerifier.clear();}catch(_){}
    recaptchaVerifier=null;
    setTimeout(initRecaptcha,500);
  }
  finally{setAuthLoading(false);}
}

async function verifyOTP(){
  if(!confirmationResult){showOTPErr('أعد إرسال الكود أولاً');return;}
  const otp=document.getElementById('auth-otp').value.trim();
  if(!otp||otp.length<6){showOTPErr('أدخل الكود المكون من 6 أرقام');return;}
  setAuthLoading(true);
  try{
    const cred=await confirmationResult.confirm(otp);
    afterFirebaseAuth(cred.user);
  }catch(e){showOTPErr(firebaseErrMsg(e.code));}
  finally{setAuthLoading(false);}
}

// ═══════════════════════ GUEST ═══════════════════════
function authGuest(){
  const uid='guest_'+Date.now();
  setSession({uid,email:'',name:'زائر',isGuest:true});
  afterAuth();
}

// ═══════════════════════ AFTER AUTH ═══════════════════════
function afterFirebaseAuth(user){
  const sess={
    uid:user.uid,
    email:user.email||'',
    name:user.displayName||user.email||user.phoneNumber||'مستخدم',
    isGuest:false
  };
  setSession(sess);
  afterAuth();
}

function afterAuth(){
  if(authStateHandled)return;
  authStateHandled=true;
  document.getElementById('auth-screen').style.display='none';
  load();
  applyTheme(D.theme||'dark');
  if(!D.pin){
    document.getElementById('pin-title').textContent='حط رقمك السري';
    document.getElementById('pin-sub').textContent='اختر رقم سري من 4 أرقام 🔐';
  }
  document.getElementById('pin-screen').style.display='flex';
}

async function authLogout(){
  if(!confirm('تقدر تدخل بنفس حسابك تاني لاحقًا.\nتخرج؟'))return;
  if(firebaseReady&&auth){try{await auth.signOut();}catch(_){}}
  clearSession();
  location.reload();
}

// ═══════════════════════ STARTUP ═══════════════════════
window.addEventListener('load',()=>{
  applyTheme('dark');
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  initFirebase();

  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{
      document.getElementById('splash').style.display='none';
      authStateHandled=false;

      if(firebaseReady){
        // Firebase configured → use onAuthStateChanged
        const unsub=auth.onAuthStateChanged(user=>{
          if(authStateHandled)return;
          unsub(); // unsubscribe after first call
          if(user){
            // Firebase user is signed in
            afterFirebaseAuth(user);
          }else{
            // Check for local guest session
            const sess=getSession();
            if(sess&&sess.isGuest){
              afterAuth();
            }else{
              clearSession();
              document.getElementById('auth-screen').style.display='flex';
            }
          }
        });
        // Timeout fallback: if Firebase takes too long, show auth screen
        setTimeout(()=>{
          if(!authStateHandled){
            authStateHandled=false; // allow auth screen to proceed
            document.getElementById('auth-screen').style.display='flex';
          }
        },4000);
      }else{
        // Firebase not configured → use local guest session
        const sess=getSession();
        if(sess){
          afterAuth();
        }else{
          document.getElementById('auth-screen').style.display='flex';
        }
      }
    },500);
  },2000);
});
window.addEventListener('resize',()=>{if(document.getElementById('page-home').classList.contains('active'))drawProgressChart();});
</script>
