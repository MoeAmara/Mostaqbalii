<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070c18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مستقبلي">
<title>مستقبلي</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
<style>
:root{
  --bg:#060b17;--surface:#0b1122;--surface2:#111828;--card:#141f38;
  --gold:#f5c842;--gold-dim:rgba(245,200,66,.13);
  --blue:#5eaeff;--blue-dim:rgba(94,174,255,.12);
  --green:#3dd68c;--green-dim:rgba(61,214,140,.12);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,.12);
  --purple:#b98ef8;--purple-dim:rgba(185,142,248,.12);
  --orange:#fb923c;--teal:#22d3ee;--pink:#f472b6;
  --text:#e8eeff;--dim:#4e5e80;--border:rgba(255,255,255,.07);
  --nav:0px;--shadow:0 8px 32px rgba(0,0,0,.5);
  --modal-bg:rgba(0,0,0,.88);
}
[data-theme="light"]{
  --bg:#f0f3ff;--surface:#e6eaf8;--surface2:#dde3f5;--card:#ffffff;
  --gold:#d4a000;--gold-dim:rgba(212,160,0,.1);
  --blue:#2a6dd9;--blue-dim:rgba(42,109,217,.1);
  --green:#1a9e6a;--green-dim:rgba(26,158,106,.1);
  --red:#d94040;--red-dim:rgba(217,64,64,.1);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,.1);
  --orange:#c2621a;
  --text:#1a2040;--dim:#6b7a9a;--border:rgba(0,0,0,.08);
  --shadow:0 4px 24px rgba(26,32,64,.12);
  --modal-bg:rgba(240,243,255,.88);
}
[data-theme="light"] .hero{background:linear-gradient(135deg,#d8e0ff,#e8eeff,#dde3f5)}
[data-theme="light"] .hero::before{background:radial-gradient(circle,rgba(212,160,0,.1),transparent 70%)}
[data-theme="light"] .pts-val{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;transition:background-color .25s,color .2s,border-color .2s}
html,body{height:100%}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;position:relative}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:200px;height:200px;object-fit:contain;animation:splashPop .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes splashPop{0%{transform:scale(0.3) rotate(-8deg);opacity:0}80%{transform:scale(1.05) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.splash-sub{font-size:16px;color:var(--dim);margin-top:16px;animation:fadeIn .8s .5s both;font-weight:600}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CUSTOM EMOJI INPUT */
.ep-btn-plus{height:40px;border-radius:10px;border:2px dashed var(--gold);background:var(--gold-dim);font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:800}
.ep-btn-plus:active{transform:scale(.93)}
.custom-emoji-input{background:var(--surface2);border:2px solid var(--gold);border-radius:12px;padding:10px 14px;color:var(--text);font-size:22px;width:100%;outline:none;margin-top:8px;text-align:center;letter-spacing:4px}
.custom-emoji-row{margin-top:8px;display:none}
.custom-emoji-row.show{display:block}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px}
.pin-logo{width:90px;height:90px;object-fit:contain;animation:logoPulse 2.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.1) rotate(3deg)}}
.pin-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.pin-sub{font-size:14px;color:var(--dim);text-align:center;margin-top:4px}
.pin-dots{display:flex;gap:18px}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--gold);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--gold);transform:scale(1.15);box-shadow:0 0 12px rgba(245,200,66,.5)}
.pin-error{color:var(--red);font-size:14px;height:20px;text-align:center}
.pin-error.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;height:66px;font-size:22px;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none}
.pin-btn:active{transform:scale(.9);background:var(--surface2);border-color:var(--gold);box-shadow:0 0 16px rgba(245,200,66,.3)}
.pin-btn.empty{background:transparent;border:none;pointer-events:none}

/* AUTH SCREEN */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.auth-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:18px}
.auth-tabs{display:flex;gap:0;background:var(--surface2);border-radius:14px;padding:4px;margin-bottom:18px;width:100%;max-width:340px}
.auth-tab{flex:1;border:none;background:transparent;color:var(--dim);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;padding:9px;border-radius:11px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--gold);color:#000}
.auth-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:13px;font-weight:700;color:var(--dim)}
.auth-field input{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:border-color .2s;width:100%}
.auth-field input:focus{border-color:var(--gold)}
.auth-err{color:var(--red);font-size:13px;text-align:center;min-height:18px}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:13px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-social{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.auth-social:hover{border-color:var(--gold);background:var(--card)}
.auth-guest{background:transparent;border:none;color:var(--dim);font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;padding:6px;text-decoration:underline;text-underline-offset:3px}
.w100{width:100%}
.auth-user-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:40px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--dim);z-index:200;display:none;align-items:center;gap:6px;white-space:nowrap}
.auth-section{display:flex;flex-direction:column;gap:12px;width:100%}
.auth-phone-row{display:flex;gap:8px;align-items:stretch}
.auth-phone-row select{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;cursor:pointer;flex-shrink:0;width:110px}
.auth-phone-row input{flex:1;min-width:0}
.auth-social.auth-google{background:#fff;color:#222;border-color:#ddd}
.auth-social.auth-google:hover{background:#f5f5f5;border-color:#bbb}
.auth-social.auth-facebook{background:#1877F2;color:#fff;border-color:#1877F2}
.auth-social.auth-facebook:hover{background:#166FE5;border-color:#166FE5}
.auth-spinner{width:22px;height:22px;border:3px solid rgba(245,200,66,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-loading-box{display:none;flex-direction:column;align-items:center;gap:8px;padding:10px;font-size:13px;color:var(--dim)}
.otp-note{font-size:12px;color:var(--dim);text-align:center;line-height:1.5}
#recaptcha-container{display:flex;justify-content:center}
.firebase-warn{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);text-align:center;line-height:1.6;display:none}

/* APP */
#app{display:none;padding-bottom:0}

/* HAMBURGER FAB */
#menu-fab{position:fixed;bottom:24px;left:20px;z-index:200;width:56px;height:56px;border-radius:20px;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 28px rgba(245,200,66,.4);transition:all .2s;color:#000}
#menu-fab:active{transform:scale(.93)}
#menu-fab.open{background:linear-gradient(135deg,var(--red),#ff4040);box-shadow:0 8px 28px rgba(255,107,107,.4)}

/* SIDE NAV OVERLAY */
#nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:150;display:none;justify-content:flex-start}
#nav-overlay.show{display:flex;animation:fadeOverlay .25s ease}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
#side-nav{background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);border-left:1px solid var(--border);width:290px;height:100%;padding:56px 16px 30px;overflow-y:auto;animation:slideRight .3s cubic-bezier(.25,.86,.4,1);display:flex;flex-direction:column;gap:6px}
[data-theme="light"] #side-nav{background:linear-gradient(180deg,#ffffff 0%,#f0f3ff 100%)}
@keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.nav-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:16px;cursor:pointer;transition:all .22s;border:1px solid transparent;position:relative}
.nav-item:active{transform:scale(.97)}
.nav-item .ni{font-size:22px;flex-shrink:0;width:30px;text-align:center}
.nav-item .nl{font-size:15px;font-weight:700;color:var(--dim);letter-spacing:-.2px}
.nav-item.active{background:linear-gradient(135deg,var(--gold-dim),rgba(251,146,60,.06));border-color:rgba(245,200,66,.25);box-shadow:0 4px 16px rgba(245,200,66,.08)}
.nav-item.active .nl{color:var(--gold)}
.nav-item.active::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:4px;height:60%;background:linear-gradient(var(--gold),var(--orange));border-radius:4px 0 0 4px}
.nav-divider{height:1px;background:var(--border);margin:8px 0}
.nav-header-lbl{font-size:10px;font-weight:800;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;padding:4px 18px 2px}

/* PAGES */
.page{display:none;padding:0 16px 24px;animation:pgIn .32s cubic-bezier(.25,.86,.4,1)}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:20px 0 14px;display:flex;align-items:center;justify-content:space-between}
.pt{font-size:28px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text),rgba(228,233,245,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;right:0;width:120px;height:120px;background:radial-gradient(circle at top right,rgba(255,255,255,.03),transparent 70%);pointer-events:none}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ct{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}

/* PROGRESS */
.pb{background:var(--surface2);border-radius:100px;height:9px;overflow:hidden;margin:8px 0 4px}
.pf{height:100%;border-radius:100px;transition:width .9s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.pf::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shim 2.5s infinite}
@keyframes shim{to{left:100%}}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:700}
.bg{background:var(--gold-dim);color:var(--gold)}
.bb{background:var(--blue-dim);color:var(--blue)}
.bgr{background:var(--green-dim);color:var(--green)}
.br{background:var(--red-dim);color:var(--red)}
.bpu{background:var(--purple-dim);color:var(--purple)}

/* STATS GRID */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scard{background:var(--surface2);border-radius:16px;padding:14px;text-align:center;border:1px solid var(--border)}
.sv{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700}
.sl{font-size:11px;color:var(--dim);margin-top:3px}

/* BUTTONS */
.btn{border:none;border-radius:14px;padding:12px 20px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;width:100%;justify-content:center}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,107,107,.3)}

/* LABEL */
.sl-label{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;margin:16px 0 9px}

/* PRAYER */
.prayer-item{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--surface2);border-radius:15px;margin-bottom:8px;cursor:pointer;transition:all .2s;border:2px solid transparent;user-select:none}
.prayer-item.done{border-color:var(--green);background:var(--green-dim)}
.prayer-item.next-prayer{border-color:var(--gold);box-shadow:0 0 14px rgba(245,200,66,.18)}
.prayer-item:active{transform:scale(.97)}
.pi{display:flex;align-items:center;gap:12px}
.picon{font-size:24px}
.pname{font-size:15px;font-weight:700}
.ptime{font-size:12px;color:var(--gold);font-family:'Space Grotesk';font-weight:600;margin-top:2px}
.pcheck{width:28px;height:28px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.prayer-item.done .pcheck{background:var(--green);border-color:var(--green);color:#fff}

/* NEXT PRAYER BANNER */
.next-prayer-banner{background:linear-gradient(135deg,var(--gold-dim),transparent);border:1px solid rgba(245,200,66,.3);border-radius:18px;padding:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.npb-label{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.npb-name{font-size:19px;font-weight:900;color:var(--gold);margin-top:2px}
.npb-time{font-size:12px;color:var(--dim);margin-top:2px}
.npb-countdown{font-family:'Space Grotesk';font-size:26px;font-weight:700;color:var(--text);text-align:center}
.npb-countdown-lbl{font-size:10px;color:var(--dim);text-align:center}

/* MILESTONE */
.ms{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--surface2);margin-bottom:8px;border:1px solid var(--border);transition:all .3s}
.ms.reached{background:var(--gold-dim);border-color:rgba(245,200,66,.4)}
.ms-ico{font-size:22px;flex-shrink:0}
.ms-info{flex:1}
.ms-title{font-size:14px;font-weight:700}
.ms-desc{font-size:12px;color:var(--dim)}

/* GRADE */
.grade-input{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;width:100%;outline:none;transition:border-color .2s;text-align:center}
.grade-input:focus{border-color:var(--gold)}
.grade-badge{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;min-width:56px;text-align:center}

/* SUBJECT ACCORDION */
.subj-card{background:var(--card);border:1px solid var(--border);border-radius:17px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.subj-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px;cursor:pointer;transition:background .2s;user-select:none}
.subj-hdr:active{background:var(--surface2)}
.subj-title{font-size:14px;font-weight:700}
.subj-body{display:none;padding:0 15px 15px;border-top:1px solid var(--border)}
.subj-body.open{display:block}
.exam-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.exam-lbl{font-size:13px;color:var(--dim);flex:1}

/* GYM CALENDAR */
.gym-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface2);color:var(--dim);font-family:'Space Grotesk',sans-serif;user-select:none}
.gym-day:active{transform:scale(.88)}
.gym-day.attended{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.gym-day.absent{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.gym-day.rest-day{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);pointer-events:none}
.gym-day.future{opacity:.22;pointer-events:none}
.gym-day.today-marker{box-shadow:0 0 0 2px var(--gold)}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mnav{background:var(--surface2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;cursor:pointer;color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center}

/* REWARD CARDS */
.reward-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;position:relative;overflow:hidden;transition:all .3s;margin-bottom:10px;box-shadow:var(--shadow)}
.reward-card.locked{opacity:.45}
.reward-card.unlocked{border-color:rgba(245,200,66,.5);background:linear-gradient(135deg,var(--gold-dim),transparent)}
.reward-card.unlocked::before{content:'✓';position:absolute;top:10px;left:10px;background:var(--gold);color:#000;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
.reward-ico{font-size:40px;margin-bottom:8px;display:block}
.reward-title{font-size:15px;font-weight:800}
.reward-cond{font-size:12px;color:var(--dim);margin-top:4px}
.reward-edit-btns{display:flex;gap:6px;margin-top:8px}

/* HOME HERO */
.hero{background:linear-gradient(145deg,#1a2850,#0e1730,#0a1220);border:1px solid rgba(245,200,66,.22);border-radius:28px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(245,200,66,.06)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(245,200,66,.15),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(94,174,255,.08),transparent 70%);pointer-events:none}
.hero-date{font-size:13px;color:var(--dim);font-weight:600}
.pts-row{display:flex;align-items:baseline;gap:8px;margin-top:14px}
.pts-val{font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--orange),#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.pts-lbl{color:var(--dim);font-size:16px;font-weight:600}
.streak-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,107,.14);border:1px solid rgba(255,107,107,.3);border-radius:100px;padding:6px 14px;margin-top:12px}
.streak-num{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--red)}
.fire-anim{animation:fireBounce 1.2s ease-in-out infinite}
@keyframes fireBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.15)}}

/* RANGE */
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:100px;background:var(--surface2);outline:none;margin:10px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 0 4px var(--gold-dim)}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--surface2);border-radius:14px;margin-bottom:9px}
.toggle{width:50px;height:26px;background:var(--surface);border-radius:100px;position:relative;cursor:pointer;border:1px solid var(--border);transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--green);border-color:var(--green)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:2px;left:2px;transition:transform .3s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(24px)}

/* CELEBRATION */
#cel{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center}
#cel.show{display:flex;animation:pgIn .3s}
.cel-ico{font-size:88px;animation:celBounce .5s ease-in-out infinite alternate}
@keyframes celBounce{0%{transform:scale(1) rotate(-5deg)}100%{transform:scale(1.15) rotate(5deg)}}
.cel-title{font-size:24px;font-weight:900;color:var(--gold)}
.cel-desc{font-size:14px;color:#aaa;max-width:280px}
.cel-pts{font-family:'Space Grotesk';font-size:48px;font-weight:700;color:#3dd68c;animation:ptsAnim .6s ease-out}
@keyframes ptsAnim{0%{transform:scale(0) translateY(20px);opacity:0}70%{transform:scale(1.2) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}

/* FLOAT PTS */
.float-pts{position:fixed;font-family:'Space Grotesk';font-weight:700;font-size:20px;color:var(--gold);pointer-events:none;z-index:99998;animation:floatUp 1.4s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}

/* CONFETTI */
.cf{position:fixed;border-radius:2px;animation:cfFall 3s ease-in forwards;z-index:99999;pointer-events:none}
@keyframes cfFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* CHART */
.chart-wrap{background:var(--surface2);border-radius:16px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.chart-wrap canvas{width:100%;display:block}

/* COMMIT GRID */
.commit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.commit-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Grotesk'}
.commit-day.full{background:var(--green);color:#fff}
.commit-day.partial{background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold)}
.commit-day.none{background:var(--surface);color:var(--dim);border:1px solid var(--border)}
.commit-day.today-c{box-shadow:0 0 0 2px var(--gold)}

/* STREAK WARN */
.streak-warn{background:var(--red-dim);border:1px solid rgba(255,107,107,.3);border-radius:14px;padding:12px 16px;font-size:13px;color:var(--red);display:none;align-items:center;gap:8px;margin-bottom:10px}
.streak-warn.show{display:flex}

/* THEME BTN */
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:7px 12px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:5px;font-family:'Tajawal';font-size:12px;font-weight:700;transition:all .2s}
.theme-btn:active{transform:scale(.93)}

/* COURSE */
.course-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.course-card::before{content:'';position:absolute;top:-40px;left:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--c-glow),transparent 70%);pointer-events:none}
.course-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.course-icon{font-size:34px;flex-shrink:0}
.course-name{font-size:16px;font-weight:800}
.course-desc{font-size:12px;color:var(--dim);margin-top:2px}
.course-actions{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
.course-act-btn{width:30px;height:30px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.course-act-btn:active{transform:scale(.88)}
.course-milestone{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:12px;background:var(--surface2);margin-top:8px;border:1px solid var(--border)}
.course-milestone.reached{background:var(--gold-dim);border-color:rgba(245,200,66,.3)}
.cml-pct{font-family:'Space Grotesk';font-size:13px;font-weight:700;min-width:36px;text-align:center;padding:3px 7px;border-radius:8px;background:var(--surface)}
.cml-reward{font-size:13px;flex:1}
.cml-check{font-size:15px;flex-shrink:0}

/* RECOVERY */
.rec-item{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.rec-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rec-icon{font-size:34px;flex-shrink:0}
.rec-name{font-size:16px;font-weight:800}
.rec-streak{font-size:12px;color:var(--dim);margin-top:2px}
.rec-check-btn{flex:1;padding:12px;border-radius:14px;border:none;font-family:'Tajawal';font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.rec-check-btn.clean{background:var(--green-dim);color:var(--green);border:2px solid var(--green)}
.rec-check-btn.failed{background:var(--red-dim);color:var(--red);border:2px solid var(--red)}
.rec-check-btn.pending{background:var(--surface2);color:var(--text);border:2px solid var(--border)}
.rec-check-btn:active{transform:scale(.96)}

/* DRAWERS / OVERLAYS */
.overlay{position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(8px);z-index:500;display:none;align-items:flex-end}
.overlay.show{display:flex}
.drawer{background:var(--card);border-radius:24px 24px 0 0;padding:22px 20px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.4);animation:drawerUp .3s ease}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-handle{width:44px;height:5px;border-radius:100px;background:var(--dim);margin:0 auto 18px;opacity:.4}
.drawer-title{font-size:19px;font-weight:900;margin-bottom:18px}

/* FIELDS */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--dim);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-family:'Tajawal';font-size:15px;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--card);color:var(--text)}
.field input[type=number]{-moz-appearance:textfield}
.field input[type=number]::-webkit-outer-spin-button,.field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* EMOJI & COLOR PICKERS */
.emoji-pick{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:6px}
.ep-btn{height:40px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.ep-btn.selected{border-color:var(--gold);background:var(--gold-dim);transform:scale(1.1)}
.color-pick{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.cp-btn{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0}
.cp-btn.selected{border-color:var(--text);transform:scale(1.15)}

/* SECTION DIVIDER */
.section-divider{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;margin:18px 0 11px;display:flex;align-items:center;gap:8px}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:36px 20px;color:var(--dim)}
.empty-ico{font-size:56px;margin-bottom:12px}
.empty-txt{font-size:15px;font-weight:700;color:var(--text)}
.empty-sub{font-size:13px;margin-top:5px}

/* FAB */
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;z-index:90}
.fab-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;border:none;border-radius:18px;padding:15px;font-family:'Tajawal';font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 24px rgba(245,200,66,.4),0 2px 8px rgba(0,0,0,.3);transition:all .2s}
.fab-btn:active{transform:scale(.97);box-shadow:0 3px 12px rgba(245,200,66,.3)}

/* SETTINGS CARD */
.settings-card{background:var(--card);border:1px solid rgba(245,200,66,.15);border-radius:22px;padding:22px;text-align:center;margin-top:24px;box-shadow:var(--shadow)}

/* INSTALL BANNER */
#install-banner{display:none;background:linear-gradient(135deg,var(--blue-dim),transparent);border:1px solid rgba(94,174,255,.25);border-radius:14px;padding:12px 16px;margin-bottom:12px;align-items:center;gap:10px}
#install-banner.show{display:flex}

/* DAYS SELECTOR */
.days-selector{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.day-chip{padding:7px 12px;border-radius:100px;font-size:13px;font-weight:700;border:2px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;transition:all .2s;font-family:'Tajawal'}
.day-chip.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}

/* GYM REST DAY LEGEND */
.gym-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--dim);justify-content:center}
.gym-legend span{display:flex;align-items:center;gap:4px}
</style>
</head>

<script>
// ═══════════════════════ DATA DEFAULTS ═══════════════════════
const DEF={
  pin:null,points:0,theme:'dark',
  prayers:{streak:0,best:0,lastFull:null,today:[false,false,false,false,false],todayDate:null,history:{}},
  uni:{subjects:[],gpa:null},
  gym:{months:{},startMonth:null,daysPerWeek:4,absLimit1:5,absLimitRest:3,gymDays:[1,2,3,4,5]},
  recovery:{items:[]},
  rewards:[],
  courses:[],
  prayerTimes:null,prayerTimesDate:null,
  location:{lat:null,lon:null,city:''},
  notif:false
};

const PRAY_NAMES=['الفجر','الظهر','العصر','المغرب','العشاء'];
const PRAY_KEYS=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
const PRAY_ICONS=['🌅','☀️','🌤️','🌇','🌙'];
const MONTHS_AR=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DAY_NAMES_SHORT=['أح','ن','ث','ر','خ','ج','س'];

const REC_SUGGESTIONS=[
  {name:'إنستجرام',icon:'📵'},
  {name:'تيك توك',icon:'🎵'},
  {name:'يوتيوب',icon:'📺'},
  {name:'تويتر',icon:'📱'},
  {name:'سناب شات',icon:'👻'},
  {name:'الألعاب',icon:'🎮'},
  {name:'السهر',icon:'🌙'},
  {name:'الأكل الجانك',icon:'🍟'},
  {name:'السكر',icon:'🍫'},
  {name:'التسوف',icon:'🛒'},
  {name:'التدخين',icon:'🚬'},
  {name:'المقاطع السيئة',icon:'🚫'},
];

let D={};
let pinBuf='',pinStep=0,tmpPin='',gymVM=null;
let countdownInterval=null,prayerTimersScheduled=false;
let editingCourseId=null,editingSubjId=null,editingRecId=null,editingRwdId=null;
let picked={course:{emoji:'📚',color:'#5eaeff'},subj:{color:'#5eaeff'},rec:{emoji:'🚫'},rwd:{emoji:'🏆'}};
let chipVals={midterm:0};
let togStates={quiz:false,section:false,lab:false};
let deferredInstallPrompt=null;

// ═══════════════════════ STORAGE ═══════════════════════
function getStorageKey(){
  const sess=getSession();
  return sess?'mq_v3_'+sess.uid:'mq_v3';
}
function load(){
  const key=getStorageKey();
  // Migrate legacy mq_v3 data to per-user key on first use
  if(key!=='mq_v3'&&!localStorage.getItem(key)&&localStorage.getItem('mq_v3')){
    localStorage.setItem(key,localStorage.getItem('mq_v3'));
  }
  const s=localStorage.getItem(key);
  if(s){
    try{
      D=JSON.parse(s);
      for(const k in DEF)if(D[k]===undefined)D[k]=JSON.parse(JSON.stringify(DEF[k]));
      if(!D.prayers.history)D.prayers.history={};
      if(!D.courses)D.courses=[];
      if(!D.recovery||!D.recovery.items)D.recovery={items:[]};
      if(!D.rewards)D.rewards=[];
      if(!D.uni.subjects)D.uni.subjects=[];
      if(!D.gym.daysPerWeek)D.gym.daysPerWeek=4;
      if(!D.gym.absLimit1)D.gym.absLimit1=5;
      if(!D.gym.absLimitRest)D.gym.absLimitRest=3;
      if(!D.gym.gymDays)D.gym.gymDays=[1,2,3,4,5];
    }catch(e){D=JSON.parse(JSON.stringify(DEF));}
  }else{
    const old=localStorage.getItem('mq_v2')||localStorage.getItem('mq_v1');
    if(old){
      try{
        const od=JSON.parse(old);
        D=JSON.parse(JSON.stringify(DEF));
        ['pin','points','prayers','gym','notif','prayerTimes','prayerTimesDate','location'].forEach(k=>{if(od[k]!==undefined)D[k]=od[k];});
        if(!D.prayers.history)D.prayers.history={};
        if(od.courses)D.courses=od.courses;
      }catch(e){D=JSON.parse(JSON.stringify(DEF));}
    }else{D=JSON.parse(JSON.stringify(DEF));}
  }
}
function save(){localStorage.setItem(getStorageKey(),JSON.stringify(D))}

// ═══════════════════════ THEME ═══════════════════════
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='light'?'light':'');
  const isLight=t==='light';
  document.querySelectorAll('#theme-tog').forEach(el=>{el.classList.toggle('on',isLight)});
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=isLight?'☀️ فاتح':'🌙 داكن';
  const lbl=document.getElementById('theme-label');
  if(lbl)lbl.textContent=isLight?'☀️ الوضع الفاتح':'🌙 الوضع الداكن';
  const logo=isLight?'./logo-light.png':'./logo-dark.png';
  ['splash-logo','pin-logo','home-logo','settings-logo','sidenav-logo','auth-logo'].forEach(id=>{const el=document.getElementById(id);if(el)el.src=logo;});
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=isLight?'#f0f3ff':'#070c18';
}
function toggleTheme(){D.theme=D.theme==='light'?'dark':'light';save();applyTheme(D.theme);setTimeout(drawProgressChart,50);}

// ═══════════════════════ PIN ═══════════════════════
function pp(d){if(pinBuf.length>=4)return;pinBuf+=d;updDots();if(pinBuf.length===4)setTimeout(submitPin,180)}
function pd(){pinBuf=pinBuf.slice(0,-1);updDots()}
function updDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinBuf.length)}
function submitPin(){
  if(!D.pin){
    if(pinStep===0){tmpPin=pinBuf;pinBuf='';pinStep=1;document.getElementById('pin-title').textContent='أكد الرقم السري';document.getElementById('pin-sub').textContent='أعد إدخال نفس الرقم';updDots();}
    else{if(pinBuf===tmpPin){D.pin=pinBuf;save();unlock();}
    else{pinErr('الرقمان غير متطابقان 😅');pinBuf='';pinStep=0;tmpPin='';document.getElementById('pin-title').textContent='حط رقمك السري';document.getElementById('pin-sub').textContent='اختر رقم سري من 4 أرقام 🔐';updDots();}}
  }else{if(pinBuf===D.pin)unlock();else{pinErr('رقم خاطئ، حاول تاني 🚫');pinBuf='';updDots();}}
}
function pinErr(msg){const e=document.getElementById('pin-err');e.textContent=msg;e.className='pin-error shake';setTimeout(()=>{e.textContent='';e.className='pin-error'},2500)}
function unlock(){document.getElementById('pin-screen').style.display='none';document.getElementById('app').style.display='block';initApp()}
function changePin(){const n=prompt('الرقم السري الجديد (4 أرقام):');if(!n||n.length!==4||isNaN(n)){alert('يجب أن يكون 4 أرقام');return}const c=prompt('أكد الرقم:');if(n!==c){alert('غير متطابقان');return}D.pin=n;save();alert('✓ تم!')}

// ═══════════════════════ INIT ═══════════════════════
function initApp(){
  applyTheme(D.theme||'dark');
  // Update session info in settings
  const sess=getSession();
  const si=document.getElementById('session-info');
  if(si&&sess){
    si.textContent=sess.isGuest?'وضع الزائر — بياناتك محفوظة محليًا 👤':'مسجّل بـ: '+sess.email+' ✓';
  }
  checkNewDay();
  checkNewRecoveryDay();
  gymVM={y:new Date().getFullYear(),m:new Date().getMonth()};
  renderPrayers();renderCourses();renderSubjects();renderGym();renderRecovery();renderRewards();
  syncAll();updDate();
  if(D.notif)document.getElementById('notif-tog').classList.add('on');
  getPrayerTimes(false);
  drawProgressChart();renderCommitGrid();checkStreakWarning();
  if(countdownInterval)clearInterval(countdownInterval);
  countdownInterval=setInterval(()=>{updPrayerCountdown();checkStreakWarning()},1000);
  setInterval(()=>getPrayerTimes(false),3600000);
  updHomeGrid();checkAllRewards();
}
function updDate(){const n=new Date();document.getElementById('h-date').textContent=`${DAYS_AR[n.getDay()]} ${n.getDate()} ${MONTHS_AR[n.getMonth()]} ${n.getFullYear()}`;}
function todayKey(){const n=new Date();return`${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())}`}
function yestKey(){const n=new Date();n.setDate(n.getDate()-1);return`${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())}`}
function p2(x){return String(x).padStart(2,'0')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

function checkNewDay(){
  const t=todayKey();
  if(D.prayers.todayDate!==t){
    if(D.prayers.todayDate){if(!D.prayers.history)D.prayers.history={};D.prayers.history[D.prayers.todayDate]=D.prayers.today.filter(Boolean).length;}
    const y=yestKey();
    if(D.prayers.lastFull!==y&&D.prayers.lastFull!==t)D.prayers.streak=0;
    D.prayers.today=[false,false,false,false,false];D.prayers.todayDate=t;save();
  }
}
function checkNewRecoveryDay(){
  const t=todayKey();
  (D.recovery.items||[]).forEach(item=>{
    if(item.todayDate!==t){item.todayDate=t;item.todayClean=null;}
  });
  save();
}

// ═══════════════════════ NAVIGATION ═══════════════════════
function openNav(){
  document.getElementById('nav-overlay').classList.add('show');
  document.getElementById('menu-fab').classList.add('open');
  document.getElementById('menu-fab').textContent='✕';
}
function closeNav(){
  document.getElementById('nav-overlay').classList.remove('show');
  document.getElementById('menu-fab').classList.remove('open');
  document.getElementById('menu-fab').textContent='☰';
}
function toggleNav(){
  const isOpen=document.getElementById('nav-overlay').classList.contains('show');
  if(isOpen)closeNav();else openNav();
}
function navOverlayClick(e){if(e.target===document.getElementById('nav-overlay'))closeNav();}

function goTo(pg){
  closeNav();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.getElementById('nav-'+pg).classList.add('active');
  const fabs=['courses-fab','uni-fab','rec-fab','rwd-fab'];
  fabs.forEach(f=>{const el=document.getElementById(f);if(el)el.style.display='none';});
  if(pg==='courses'){const el=document.getElementById('courses-fab');if(el)el.style.display='block';renderCourses();}
  if(pg==='uni'){const el=document.getElementById('uni-fab');if(el)el.style.display='block';renderSubjects();}
  if(pg==='gym')renderGym();
  if(pg==='recovery'){const el=document.getElementById('rec-fab');if(el)el.style.display='block';renderRecovery();}
  if(pg==='rewards'){const el=document.getElementById('rwd-fab');if(el)el.style.display='block';checkAllRewards();renderRewards();}
  if(pg==='home'){updHome();drawProgressChart();}
  if(pg==='prayer')renderCommitGrid();
}

// ═══════════════════════ CUSTOM EMOJI ═══════════════════════
function toggleCustomEmoji(type){
  const row=document.getElementById(type+'-custom-row');

// ═══════════════════════ PRAYER TIMES ═══════════════════════
function getPrayerTimes(force){
  const t=todayKey();
  if(!force&&D.prayerTimes&&D.prayerTimesDate===t&&D.location.lat){renderPrayers();return;}
  if(!navigator.geolocation){fetchPrayerByIP();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{D.location.lat=pos.coords.latitude;D.location.lon=pos.coords.longitude;save();fetchPrayerTimesFromAPI(D.location.lat,D.location.lon);},
    ()=>{D.location.lat?fetchPrayerTimesFromAPI(D.location.lat,D.location.lon):fetchPrayerByIP();},{timeout:8000}
  );
}
function fetchPrayerByIP(){fetch('https://ip-api.com/json/?fields=lat,lon,city').then(r=>r.json()).then(d=>{D.location.lat=d.lat;D.location.lon=d.lon;D.location.city=d.city||'';save();fetchPrayerTimesFromAPI(d.lat,d.lon);}).catch(()=>fetchPrayerTimesFromAPI(30.04,31.24));}
function fetchPrayerTimesFromAPI(lat,lon){
  const now=new Date();
  fetch(`https://api.aladhan.com/v1/timings/${Math.floor(now.getTime()/1000)}?latitude=${lat}&longitude=${lon}&method=5`)
    .then(r=>r.json()).then(data=>{
      if(data.code===200){
        D.prayerTimes=data.data.timings;D.prayerTimesDate=todayKey();
        const city=D.location.city||`${lat.toFixed(1)},${lon.toFixed(1)}`;
        const lbl=document.getElementById('location-lbl');if(lbl)lbl.textContent='📍 '+city;
        save();renderPrayers();schedulePrayerReminders(D.prayerTimes);
      }
    }).catch(()=>{});
}
function parseTime12(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function formatTime(t){const[h,m]=t.split(':').map(Number);const ap=h<12?'ص':'م';return`${h%12||12}:${p2(m)} ${ap}`}
function getNextPrayer(){
  if(!D.prayerTimes)return null;
  const now=new Date(),cur=now.getHours()*60+now.getMinutes();
  const ps=PRAY_KEYS.map((k,i)=>({name:PRAY_NAMES[i],key:k,time:D.prayerTimes[k],min:parseTime12(D.prayerTimes[k]),idx:i}));
  return ps.find(p=>p.min>cur)||ps[0];
}
function updPrayerCountdown(){
  const next=getNextPrayer();
  if(!next){return;}
  const now=new Date(),cur=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  let diff=next.min-cur;if(diff<0)diff+=24*60;
  const hrs=Math.floor(diff/60),mins=Math.floor(diff%60),secs=Math.floor((diff-Math.floor(diff))*60);
  const el=document.getElementById('npb-countdown');if(el)el.textContent=hrs>0?`${hrs}:${p2(mins)}:${p2(secs)}`:`${mins}:${p2(secs)}`;
  const nm=document.getElementById('npb-name');if(nm)nm.textContent=next.name;
  const nt=document.getElementById('npb-time');if(nt)nt.textContent=D.prayerTimes?formatTime(next.time):'';
  document.querySelectorAll('.prayer-item').forEach((el,i)=>{el.classList.toggle('next-prayer',i===next.idx&&!D.prayers.today[i]);});
}
function schedulePrayerReminders(times){
  if(!D.notif||!('Notification' in window)||Notification.permission!=='granted'||prayerTimersScheduled)return;
  prayerTimersScheduled=true;
  const now=new Date(),cur=now.getHours()*60+now.getMinutes();
  PRAY_KEYS.forEach((key,i)=>{const diff=(parseTime12(times[key])-10-cur)*60000;if(diff>0)setTimeout(()=>{if(Notification.permission==='granted'&&!D.prayers.today[i])new Notification(`🕌 ${PRAY_NAMES[i]} بعد 10 دقايق`,{body:`وقت ${PRAY_NAMES[i]}: ${formatTime(times[key])} 🤲`});},diff);});
}

// ═══════════════════════ PRAYERS ═══════════════════════
function renderPrayers(){
  document.getElementById('prayers-list').innerHTML=PRAY_NAMES.map((n,i)=>`
    <div class="prayer-item${D.prayers.today[i]?' done':''}" onclick="togPray(${i})" id="pray-item-${i}">
      <div class="pi"><div class="picon">${PRAY_ICONS[i]}</div>
        <div><div class="pname">${n}</div>${D.prayerTimes?`<div class="ptime">${formatTime(D.prayerTimes[PRAY_KEYS[i]])}</div>`:''}</div>
      </div>
      <div class="pcheck">${D.prayers.today[i]?'✓':''}</div>
    </div>`).join('');
  updPrayUI();
}
function togPray(i){
  D.prayers.today[i]=!D.prayers.today[i];
  const pts=D.prayers.today[i]?10:-10;D.points+=pts;if(D.points<0)D.points=0;
  if(D.prayers.today[i]){const el=document.getElementById('pray-item-'+i);if(el)showFP('+10',el);}
  const all=D.prayers.today.every(Boolean),t=todayKey();
  if(all&&D.prayers.lastFull!==t){
    D.prayers.lastFull=t;D.prayers.streak++;if(D.prayers.streak>D.prayers.best)D.prayers.best=D.prayers.streak;
    D.points+=50;showFP('+50 🎉',document.getElementById('prayers-list'));
    if(!D.prayers.history)D.prayers.history={};D.prayers.history[t]=5;
  }
  if(!D.prayers.history)D.prayers.history={};D.prayers.history[t]=D.prayers.today.filter(Boolean).length;
  save();renderPrayers();updHome();renderCommitGrid();checkAllRewards();
}
function updPrayUI(){
  const cnt=D.prayers.today.filter(Boolean).length;
  const pc=document.getElementById('pray-count');if(pc)pc.textContent=cnt+'/5';
  const pb=document.getElementById('pray-pb');if(pb)pb.style.width=(cnt/5*100)+'%';
  const pn=document.getElementById('ps-num');if(pn)pn.textContent=D.prayers.streak;
  const msgs=['ابدأ يومك بالفجر 🌅','صلي الظهر! كمان 4 باقيين','أكثر من النص 💪','كمان اتنين!','كمان واحدة!','🎉 أتممت الصلوات!'];
  const pm=document.getElementById('pray-msg');if(pm)pm.textContent=msgs[cnt]||'';
  const s=D.prayers.streak;
  setMS('mp7',s>=7,'mp7-b',s+'/7 يوم','badge bg');
  setMS('mp30',s>=30,'mp30-b',s+'/30 يوم','badge bg');
  setMS('mp60',s>=60,'mp60-b',s+'/60 يوم','badge bg');
}
function setMS(id,done,bId,txt,baseCls){
  const el=document.getElementById(id);if(el)el.classList.toggle('reached',done);
  const b=document.getElementById(bId);if(!b)return;
  if(done){b.textContent='✓ مفتوح';b.className='badge bgr';}else{b.textContent=txt;b.className=baseCls;}
}
function renderCommitGrid(){
  const grid=document.getElementById('commit-grid');if(!grid)return;
  const today=todayKey();const history=D.prayers.history||{};let fullDays=0;
  const days=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;days.push({key,day:d.getDate()});}
  grid.innerHTML=days.map(({key,day})=>{
    let cnt=history[key]||0;if(key===today)cnt=D.prayers.today.filter(Boolean).length;
    const cls=cnt===5?'commit-day full':cnt>0?'commit-day partial':'commit-day none';
    if(cnt===5)fullDays++;
    return`<div class="${cls}${key===today?' today-c':''}" title="${day}: ${cnt}/5">${day}</div>`;
  }).join('');
  const cc=document.getElementById('commit-cnt');if(cc)cc.textContent=fullDays+' يوم كامل';
}
function checkStreakWarning(){
  const warn=document.getElementById('streak-warn-home');if(!warn)return;
  const hour=new Date().getHours(),cnt=D.prayers.today.filter(Boolean).length;
  if(hour>=20&&cnt<5&&D.prayers.streak>0){warn.classList.add('show');const el=document.getElementById('streak-warn-txt');if(el)el.textContent=`الـ streak (${D.prayers.streak} يوم) هيضيع! باقي ${5-cnt} صلوات`;}
  else warn.classList.remove('show');
}

    document.getElementById('f-cname').value=c.name||'';
    document.getElementById('f-ctotal').value=c.total||'';

    document.getElementById('f-cr50').value=c.rewards?.r50||'';
    document.getElementById('f-cr75').value=c.rewards?.r75||'';
    document.getElementById('f-cr100').value=c.rewards?.r100||'';
    picked.course={emoji:c.icon||'📚',color:c.color||'#5eaeff'};
  }else{
    title.textContent='➕ إضافة كورس جديد';
    ['f-cname','f-ctotal','f-cdesc','f-cr25','f-cr50','f-cr75','f-cr100'].forEach(id=>document.getElementById(id).value='');
    picked.course={emoji:'📚',color:'#5eaeff'};
  }

  document.querySelectorAll('#course-color-pick .cp-btn').forEach(b=>b.classList.toggle('selected',b.dataset.color===picked.course.color));
  openOverlay('course-overlay');
}
function saveCourse(){
  const name=document.getElementById('f-cname').value.trim();
  const total=parseInt(document.getElementById('f-ctotal').value)||0;
  const r100=document.getElementById('f-cr100').value.trim();
  if(!name){alert('اكتب اسم الكورس!');return}
  if(!total||total<1){alert('اكتب عدد الفيديوهات!');return}
  if(!r100){alert('اكتب المكافأة الكبرى!');return}
  const course={
    id:editingCourseId||uid(),name,icon:picked.course.emoji||'📚',color:picked.course.color||'#5eaeff',
    total,desc:document.getElementById('f-cdesc').value.trim(),
    rewards:{r25:document.getElementById('f-cr25').value.trim(),r50:document.getElementById('f-cr50').value.trim(),r75:document.getElementById('f-cr75').value.trim(),r100},
    done:0
  };
  if(editingCourseId){const idx=D.courses.findIndex(x=>x.id===editingCourseId);if(idx!==-1){course.done=D.courses[idx].done;D.courses[idx]=course;}}
  else{D.courses.push(course);D.points+=20;showFP('+20 📚',document.getElementById('courses-container'));}
  save();closeOverlay('course-overlay');renderCourses();checkAllRewards();renderRewards();updHome();
}
function deleteCourse(id){if(!confirm('تمسح الكورس ده؟'))return;D.courses=D.courses.filter(c=>c.id!==id);save();renderCourses();renderRewards();updHome();}
function upCourse(id,v){
  const c=D.courses.find(x=>x.id===id);if(!c)return;
  v=Math.max(0,Math.min(c.total,parseInt(v)||0));const prev=c.done;c.done=v;
  if(v>prev){const g=(v-prev)*4;D.points+=g;showFP(`+${g}`,document.getElementById(`c-num-${id}`));}
  save();
  const pct=Math.round(v/c.total*100);
  const upEl=(eid,val)=>{const el=document.getElementById(eid);if(el)el.textContent=val;};
  const upVal=(eid,val)=>{const el=document.getElementById(eid);if(el)el.value=val;};
  const upStyle=(eid,prop,val)=>{const el=document.getElementById(eid);if(el)el.style[prop]=val;};
  upEl(`c-num-${id}`,v);upStyle(`c-pb-${id}`,'width',pct+'%');upEl(`c-pct-${id}`,pct+'%');upVal(`c-slider-${id}`,v);upVal(`c-inp-${id}`,v);
  updCourseMilestones(c);checkAllRewards();updHome();renderRewards();
}
function updCourseMilestones(c){[25,50,75,100].forEach(pct=>{const el=document.getElementById(`cml-${c.id}-${pct}`);if(!el)return;const target=Math.round(c.total*pct/100);const reached=c.done>=target;el.classList.toggle('reached',reached);const chk=el.querySelector('.cml-check');if(chk)chk.textContent=reached?'✅':'🔒';});}
function renderCourses(){
  const container=document.getElementById('courses-container');const cnt=document.getElementById('courses-cnt');
  if(!container)return;
  if(!D.courses||D.courses.length===0){container.innerHTML=`<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-txt">مفيش كورسات لسه</div><div class="empty-sub">اضغط الزرار في الأسفل</div></div>`;if(cnt)cnt.textContent='0 كورس';return;}
  if(cnt)cnt.textContent=`${D.courses.length} كورس`;
  container.innerHTML=D.courses.map(c=>renderCourseCard(c)).join('')+'<div style="height:80px"></div>';
}
function renderCourseCard(c){
  const pct=Math.round(c.done/c.total*100);
  const hex2rgba=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`};
  const glow=hex2rgba(c.color||'#5eaeff','0.12');
  const mils=[25,50,75,100].map(p=>{const rw=c.rewards?.[`r${p}`];if(!rw&&p!==100)return'';const tgt=Math.round(c.total*p/100);const reached=c.done>=tgt;return`<div class="course-milestone${reached?' reached':''}" id="cml-${c.id}-${p}"><div class="cml-pct" style="color:${c.color||'var(--blue)'}">${p}%</div><div class="cml-reward">${rw||'أتممت الكورس'} <span style="font-size:11px;color:var(--dim)">(${tgt})</span></div><div class="cml-check">${reached?'✅':'🔒'}</div></div>`;}).join('');
  return`<div class="course-card" style="--c-glow:${glow}"><div class="course-header"><div class="course-icon">${c.icon||'📚'}</div><div style="flex:1"><div class="course-name">${c.name}</div>${c.desc?`<div class="course-desc">${c.desc}</div>`:''}</div><div class="course-actions"><button class="course-act-btn" onclick="openOverlay_course('${c.id}')">✏️</button><button class="course-act-btn" onclick="deleteCourse('${c.id}')">🗑️</button></div></div><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px"><div style="display:flex;align-items:baseline;gap:4px"><span id="c-num-${c.id}" style="font-family:'Space Grotesk';font-size:30px;font-weight:700;color:${c.color||'var(--blue)'}">${c.done}</span><span style="color:var(--dim)">/${c.total} فيديو</span></div><span class="badge" id="c-pct-${c.id}" style="background:${glow};color:${c.color||'var(--blue)'}">${pct}%</span></div><div class="pb"><div class="pf" id="c-pb-${c.id}" style="width:${pct}%;background:linear-gradient(90deg,${c.color||'#5eaeff'},${c.color||'#5eaeff'}aa)"></div></div><input type="range" min="0" max="${c.total}" value="${c.done}" id="c-slider-${c.id}" oninput="upCourse('${c.id}',this.value)"><div style="display:flex;gap:10px;align-items:center;margin-top:6px"><input type="number" min="0" max="${c.total}" class="grade-input" style="max-width:85px" placeholder="0" value="${c.done||''}" id="c-inp-${c.id}" oninput="upCourse('${c.id}',this.value)"><span style="color:var(--dim);font-size:12px">أو اكتب</span></div><div style="margin-top:10px">${mils}</div></div>`;
}

  const container=document.getElementById('subjs-container');if(!container)return;

function buildExams(s){
  const exams=[];
  for(let i=1;i<=s.midterms;i++)exams.push({k:`mid${i}`,l:`ميدترم ${i}`});
  for(let i=1;i<=s.quizzes;i++)exams.push({k:`quiz${i}`,l:`كويز ${i}`});
  for(let i=1;i<=s.sectionExams;i++)exams.push({k:`sec${i}`,l:`سيكشن ${i}`});
  for(let i=1;i<=s.labExams;i++)exams.push({k:`lab${i}`,l:`معمل ${i}`});
  return exams;
}
function renderSubjCard(s){
  const exams=buildExams(s);const grades=s.grades||{};
  const vals=exams.map(e=>grades[e.k]).filter(v=>v!==null&&v!==undefined&&v!=='');
  const avg=vals.length?(vals.reduce((a,b)=>a+parseFloat(b),0)/vals.length).toFixed(1):null;
  const sid=s.id.replace(/[^a-z0-9]/gi,'_');
  const examsHtml=exams.map(e=>`<div class="exam-row"><div class="exam-lbl">${e.l}</div><input type="number" min="0" max="100" class="grade-input" style="max-width:75px;padding:8px 10px" placeholder="--" value="${grades[e.k]!==null&&grades[e.k]!==undefined&&grades[e.k]!==''?grades[e.k]:''}" oninput="upGrade('${s.id}','${e.k}',this.value)"><div class="grade-badge" style="background:${grades[e.k]?gradeBg(grades[e.k]):'var(--surface2)'};color:${grades[e.k]?gradeColor(grades[e.k]):'var(--dim)'}">${grades[e.k]?gradeLabel(grades[e.k]):'--'}</div></div>`).join('');
  return`<div class="subj-card"><div class="subj-hdr" onclick="togSubj('${sid}')"><div style="display:flex;align-items:center;gap:10px"><div style="width:9px;height:9px;border-radius:50%;background:${s.color};flex-shrink:0"></div><div class="subj-title">${s.nameAr||s.name}</div></div><div style="display:flex;align-items:center;gap:8px">${avg?`<span style="font-family:'Space Grotesk';font-weight:700;color:${gradeColor(avg)}">${avg}%</span><span class="grade-badge" style="background:${gradeBg(avg)};color:${gradeColor(avg)}">${gradeLabel(avg)}</span>`:''}<button class="course-act-btn" onclick="event.stopPropagation();openSubjDrawer('${s.id}')" style="font-size:12px;width:26px;height:26px">✏️</button><button class="course-act-btn" onclick="event.stopPropagation();deleteSubject('${s.id}')" style="font-size:12px;width:26px;height:26px">🗑️</button><span style="color:var(--dim);font-size:16px">›</span></div></div><div class="subj-body" id="sb-${sid}">${exams.length?examsHtml:'<div style="padding:12px 0;color:var(--dim);font-size:13px">لا توجد امتحانات مضافة</div>'}</div></div>`;
}
function togSubj(id){document.getElementById('sb-'+id).classList.toggle('open')}
function upGrade(subjId,key,v){v=v===''?null:Math.max(0,Math.min(100,parseFloat(v)));const s=D.uni.subjects.find(x=>x.id===subjId);if(!s)return;if(!s.grades)s.grades={};s.grades[key]=v;save();renderSubjects();}
function upGPA(v){
  v=v===''?null:Math.max(0,Math.min(4,parseFloat(v)));D.uni.gpa=v;
  const disp=document.getElementById('gpa-disp'),stat=document.getElementById('gpa-stat'),badge=document.getElementById('gpa-badge');
  if(v!==null){if(disp)disp.textContent=v.toFixed(2);if(badge)badge.textContent='GPA: '+v.toFixed(2);
    if(stat){if(v>=3.7){stat.textContent='🌟 ممتاز جداً!';stat.style.color='var(--gold)';}else{stat.textContent=(3.7-v).toFixed(2)+' نقطة للامتياز';stat.style.color='var(--dim)';}}}
  else{if(disp)disp.textContent='--';if(badge)badge.textContent='GPA: --';}
  save();checkAllRewards();
}
function gradeLabel(g){g=parseFloat(g);if(g>=85)return'ممتاز';if(g>=75)return'جيد جداً';if(g>=65)return'جيد';if(g>=50)return'مقبول';return'راسب'}
function gradeColor(g){g=parseFloat(g);if(g>=85)return'var(--gold)';if(g>=75)return'var(--green)';if(g>=65)return'var(--blue)';if(g>=50)return'var(--orange)';return'var(--red)'}
function gradeBg(g){g=parseFloat(g);if(g>=85)return'var(--gold-dim)';if(g>=75)return'var(--green-dim)';if(g>=65)return'var(--blue-dim)';if(g>=50)return'rgba(251,146,60,.13)';return'var(--red-dim)'}

// ═══════════════════════ GYM ═══════════════════════
function gymMK(y,m){return`${y}-${p2(m+1)}`}
function openGymSettings(){
  const sel=document.getElementById('gym-days-selector');
  sel.innerHTML=Array.from({length:7},(_,i)=>`<div class="day-chip${D.gym.gymDays.includes(i+1)?' selected':''}" data-day="${i+1}" onclick="togGymDay(${i+1},this)">${['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][i]}</div>`).join('');
  document.getElementById('f-gym-abs1').value=D.gym.absLimit1||5;
  document.getElementById('f-gym-abs2').value=D.gym.absLimitRest||3;
  openOverlay('gym-settings-overlay');
}
function togGymDay(day,el){
  const days=D.gym.gymDays||[];const idx=days.indexOf(day);
  if(idx===-1)days.push(day);else days.splice(idx,1);
  D.gym.gymDays=days;el.classList.toggle('selected',days.includes(day));
}
function saveGymSettings(){
  D.gym.absLimit1=parseInt(document.getElementById('f-gym-abs1').value)||5;
  D.gym.absLimitRest=parseInt(document.getElementById('f-gym-abs2').value)||3;
  save();closeOverlay('gym-settings-overlay');renderGym();
}
function isRestDay(y,m,d){const dow=new Date(y,m,d).getDay();const gymDays=D.gym.gymDays||[1,2,3,4,5];return!gymDays.includes(dow===0?7:dow);}
function renderGym(){
  if(!gymVM)return;
  const{y,m}=gymVM,mk=gymMK(y,m);
  document.getElementById('gym-mlbl').textContent=`${MONTHS_AR[m]} ${y}`;
  if(!D.gym.months[mk])D.gym.months[mk]={days:{}};
  if(!D.gym.startMonth){D.gym.startMonth=mk;save();}
  const mData=D.gym.months[mk],now=new Date();
  const dim=new Date(y,m+1,0).getDate(),firstDay=new Date(y,m,1).getDay(),offset=(firstDay+1)%7;
  let cal='';
  for(let i=0;i<offset;i++)cal+='<div></div>';
  for(let d=1;d<=dim;d++){
    const st=mData.days[d],isFuture=new Date(y,m,d)>now,isToday=now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
    const isRest=isRestDay(y,m,d);
    let cls='gym-day';
    if(isRest)cls+=' rest-day';
    else if(st==='attended')cls+=' attended';else if(st==='absent')cls+=' absent';
    if(isFuture&&!isRest)cls+=' future';if(isToday)cls+=' today-marker';
    cal+=`<div class="${cls}" onclick="${isRest?'':''}" ${isRest?'':`onclick="togGym(${d})"`}>${d}</div>`;
  }
  document.getElementById('gym-cal').innerHTML=cal;
  const att=Object.values(mData.days).filter(v=>v==='attended').length,abs=Object.values(mData.days).filter(v=>v==='absent').length;
  const isFirst=mk===D.gym.startMonth,maxAbs=isFirst?D.gym.absLimit1:D.gym.absLimitRest,ok=abs<=maxAbs;
  document.getElementById('gym-stat').innerHTML=`<div class="ch"><div class="ct">📊 إحصائيات ${MONTHS_AR[m]}</div><div class="badge ${ok?'bgr':'br'}">${ok?'✓ التزمت':'⚠️ تجاوزت'}</div></div><div class="sgrid"><div class="scard"><div class="sv" style="color:var(--green)">${att}</div><div class="sl">يوم حضرت 💪</div></div><div class="scard"><div class="sv" style="color:${ok?'var(--orange)':'var(--red)'}">${abs}/${maxAbs}</div><div class="sl">غياب (حد ${maxAbs})</div></div></div><div style="margin-top:8px;font-size:12px;color:var(--dim)">${isFirst?'📅 الشهر الأول — حد '+D.gym.absLimit1+' أيام':'📅 حد '+D.gym.absLimitRest+' أيام'} | 🏃 ${D.gym.daysPerWeek||4} أيام/أسبوع</div>`;
}
function togGym(d){
  const mk=gymMK(gymVM.y,gymVM.m);if(!D.gym.months[mk])D.gym.months[mk]={days:{}};
  const cur=D.gym.months[mk].days[d];
  if(!cur){D.gym.months[mk].days[d]='attended';D.points+=20;showFP('+20 💪',document.getElementById('gym-cal'));}
  else if(cur==='attended')D.gym.months[mk].days[d]='absent';
  else delete D.gym.months[mk].days[d];
  save();renderGym();checkAllRewards();updHome();
}
function chMonth(d){gymVM.m+=d;if(gymVM.m>11){gymVM.m=0;gymVM.y++;}if(gymVM.m<0){gymVM.m=11;gymVM.y--;}renderGym();}

// ═══════════════════════ RECOVERY ═══════════════════════
function openRecDrawer(recId){
  editingRecId=recId||null;
  // Suggestions
  const sugg=document.getElementById('rec-suggestions');
  sugg.innerHTML=REC_SUGGESTIONS.map(s=>`<button class="day-chip" onclick="fillRec('${s.name}','${s.icon}')">${s.icon} ${s.name}</button>`).join('');
  const title=document.getElementById('rec-drawer-title');
  if(recId){
    const r=D.recovery.items.find(x=>x.id===recId);if(!r)return;

    document.getElementById('f-rdesc').value=r.desc||'';
    picked.rec={emoji:r.icon||'🚫'};
  }else{
    title.textContent='🌱 إضافة تعافي جديد';

    picked.rec={emoji:'🚫'};
  }
  document.querySelectorAll('#rec-emoji-pick .ep-btn').forEach(b=>b.classList.toggle('selected',b.textContent.trim()===picked.rec.emoji));
  openOverlay('rec-overlay');
}
function fillRec(name,icon){
  document.getElementById('f-rname').value=name;picked.rec.emoji=icon;
  document.querySelectorAll('#rec-emoji-pick .ep-btn').forEach(b=>b.classList.toggle('selected',b.textContent.trim()===icon));
}
function saveRecovery(){
  const name=document.getElementById('f-rname').value.trim();
  if(!name){alert('اكتب اسم الشيء اللي عايز تتعافى منه!');return}
  const item={
    id:editingRecId||uid(),name,icon:picked.rec.emoji||'🚫',desc:document.getElementById('f-rdesc').value.trim(),
    streak:0,best:0,lastClean:null,todayDate:todayKey(),todayClean:null,history:{}
  };
  if(editingRecId){const idx=D.recovery.items.findIndex(x=>x.id===editingRecId);if(idx!==-1){item.streak=D.recovery.items[idx].streak;item.best=D.recovery.items[idx].best;item.lastClean=D.recovery.items[idx].lastClean;item.history=D.recovery.items[idx].history||{};item.todayClean=D.recovery.items[idx].todayClean;D.recovery.items[idx]=item;}}
  else D.recovery.items.push(item);
  save();closeOverlay('rec-overlay');renderRecovery();checkAllRewards();
}
function deleteRec(id){if(!confirm('تمسح التعافي ده؟'))return;D.recovery.items=D.recovery.items.filter(r=>r.id!==id);save();renderRecovery();renderRewards();}
function togRec(id,clean){
  const item=D.recovery.items.find(x=>x.id===id);if(!item)return;
  const t=todayKey();item.todayDate=t;
  if(item.todayClean===clean){item.todayClean=null;}
  else{
    item.todayClean=clean;item.history[t]=clean;
    if(clean){
      const y=yestKey();
      if(item.lastClean===y){item.streak++;}
      else if(item.lastClean!==t){item.streak=1;}
      item.lastClean=t;
      if(item.streak>item.best)item.best=item.streak;
      D.points+=15;showFP('+15 🌱',document.getElementById('rec-container'));
    }else{item.streak=0;}
  }
  save();renderRecovery();checkAllRewards();renderRewards();updHome();
}
function renderRecovery(){
  const container=document.getElementById('rec-container');if(!container)return;
  const items=D.recovery.items||[];
  if(items.length===0){container.innerHTML=`<div class="empty-state"><div class="empty-ico">🌱</div><div class="empty-txt">ابدأ رحلة التعافي</div><div class="empty-sub">أضف الحاجة اللي عايز تتوقف عنها</div></div>`;return;}
  container.innerHTML=items.map(r=>renderRecCard(r)).join('')+'<div style="height:80px"></div>';
  const badges=document.getElementById('rec-badges');if(badges){const total=items.reduce((a,b)=>a+(b.streak||0),0);badges.innerHTML=`<div class="badge bgr">🔥 ${total} يوم إجمالي</div>`;}
}
function renderRecCard(r){
  const t=todayKey();const isToday=r.todayDate===t;const clean=isToday?r.todayClean:null;
  const streak=r.streak||0;
  const hist=r.history||{};const last28=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;last28.push({k,v:hist[k]});}
  const gridHtml=last28.map(({v})=>`<div style="width:100%;aspect-ratio:1;border-radius:4px;background:${v===true?'var(--green)':v===false?'var(--red)':'var(--surface2)'};border:1px solid var(--border)"></div>`).join('');
  return`<div class="rec-item"><div class="rec-header"><div class="rec-icon">${r.icon||'🚫'}</div><div style="flex:1"><div class="rec-name">${r.name}</div><div class="rec-streak">استريك: 🔥 ${streak} يوم | أفضل: ${r.best||0} يوم</div>${r.desc?`<div class="rec-streak">${r.desc}</div>`:''}</div><div style="display:flex;gap:6px"><button class="course-act-btn" onclick="openRecDrawer('${r.id}')">✏️</button><button class="course-act-btn" onclick="deleteRec('${r.id}')">🗑️</button></div></div><div class="sl-label" style="margin-top:4px;margin-bottom:8px">سجّل اليوم</div><div style="display:flex;gap:10px;margin-bottom:14px"><button class="rec-check-btn${clean===true?' clean':' pending'}" onclick="togRec('${r.id}',true)">✅ نظيف اليوم</button><button class="rec-check-btn${clean===false?' failed':' pending'}" onclick="togRec('${r.id}',false)">❌ وقعت فيه</button></div><div style="display:grid;grid-template-columns:repeat(14,1fr);gap:3px">${gridHtml}</div></div>`;
}

// ═══════════════════════ REWARDS ═══════════════════════
function openRwdDrawer(rwdId){
  editingRwdId=rwdId||null;
  const title=document.getElementById('rwd-drawer-title');
  if(rwdId){
    const r=D.rewards.find(x=>x.id===rwdId);if(!r)return;
    title.textContent='✏️ تعديل المكافأة';
    document.getElementById('f-rwname').value=r.name||'';
    document.getElementById('f-rwpts').value=r.pts||100;
    document.getElementById('f-rwcond').value=r.condType||'';
    picked.rwd={emoji:r.icon||'🏆'};
    document.querySelectorAll('#rwd-emoji-pick .ep-btn').forEach(b=>b.classList.toggle('selected',b.textContent.trim()===picked.rwd.emoji));
    updRwdCondUI();
    setTimeout(()=>{
      const vf=document.getElementById('f-rwcval');if(vf)vf.value=r.condValue||'';
      const rf=document.getElementById('f-rwcref');if(rf)rf.value=r.condRef||'';
    },50);
  }else{
    title.textContent='🏆 إضافة مكافأة';
    ['f-rwname','f-rwpts','f-rwcval'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('f-rwcond').value='';

    document.querySelectorAll('#rwd-emoji-pick .ep-btn').forEach(b=>b.classList.toggle('selected',b.textContent.trim()==='🏆'));
    updRwdCondUI();
  }
  openOverlay('rwd-overlay');
}
function updRwdCondUI(){
  const type=document.getElementById('f-rwcond').value;
  const extra=document.getElementById('rwd-cond-extra');
  const valField=document.getElementById('rwd-cond-val-field');
  const refField=document.getElementById('rwd-cond-ref-field');
  const valLbl=document.getElementById('rwd-cond-val-label');
  const refLbl=document.getElementById('rwd-cond-ref-label');
  const refSel=document.getElementById('f-rwcref');
  extra.style.display=type&&type!=='manual'?'block':'none';
  if(!type||type==='manual'){valField.style.display='none';refField.style.display='none';return;}
  if(type==='pray_streak'){valField.style.display='block';valLbl.textContent='عدد الأيام المتتالية';refField.style.display='none';}
  else if(type==='rec_streak'){valField.style.display='block';valLbl.textContent='عدد الأيام المتتالية';refField.style.display='block';refLbl.textContent='اختر العادة';refSel.innerHTML=`<option value="">اختر</option>${(D.recovery.items||[]).map(r=>`<option value="${r.id}">${r.icon} ${r.name}</option>`).join('')}`;}
  else if(type==='course_pct'){valField.style.display='block';valLbl.textContent='النسبة المئوية (%)';refField.style.display='block';refLbl.textContent='اختر الكورس';refSel.innerHTML=`<option value="">اختر</option>${(D.courses||[]).map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}`;}
  else if(type==='gym_attend'){valField.style.display='block';valLbl.textContent='عدد أيام الحضور في الشهر';refField.style.display='none';}
  else if(type==='points'){valField.style.display='block';valLbl.textContent='عدد النقاط';refField.style.display='none';}
}
function saveReward(){
  const name=document.getElementById('f-rwname').value.trim();
  if(!name){alert('اكتب اسم المكافأة!');return}
  const condType=document.getElementById('f-rwcond').value;
  if(!condType){alert('اختر نوع الشرط!');return}
  const condValue=parseInt(document.getElementById('f-rwcval')?.value)||0;
  const condRef=document.getElementById('f-rwcref')?.value||'';
  if(condType!=='manual'&&!condValue&&condType!=='manual'){alert('اكتب قيمة الشرط!');return}
  const rwd={
    id:editingRwdId||uid(),name,icon:picked.rwd.emoji||'🏆',
    pts:parseInt(document.getElementById('f-rwpts').value)||100,
    condType,condValue,condRef,achieved:false
  };
  if(editingRwdId){const idx=D.rewards.findIndex(x=>x.id===editingRwdId);if(idx!==-1){rwd.achieved=D.rewards[idx].achieved;D.rewards[idx]=rwd;}}
  else D.rewards.push(rwd);
  save();closeOverlay('rwd-overlay');checkAllRewards();renderRewards();
}
function deleteReward(id){if(!confirm('تمسح المكافأة دي؟'))return;D.rewards=D.rewards.filter(r=>r.id!==id);save();renderRewards();}
function checkRewardCondition(r){
  if(r.condType==='manual')return false;
  if(r.condType==='pray_streak')return D.prayers.streak>=(r.condValue||0);
  if(r.condType==='rec_streak'){const item=(D.recovery.items||[]).find(x=>x.id===r.condRef);return item&&item.streak>=(r.condValue||0);}
  if(r.condType==='course_pct'){const c=(D.courses||[]).find(x=>x.id===r.condRef);if(!c)return false;return Math.round(c.done/c.total*100)>=(r.condValue||0);}
  if(r.condType==='gym_attend'){const now=new Date();const mk=gymMK(now.getFullYear(),now.getMonth());const mData=D.gym.months[mk];if(!mData)return false;return Object.values(mData.days||{}).filter(v=>v==='attended').length>=(r.condValue||0);}
  if(r.condType==='points')return D.points>=(r.condValue||0);
  return false;
}
function checkAllRewards(){
  (D.rewards||[]).forEach(r=>{
    if(!r.achieved&&checkRewardCondition(r)){r.achieved=true;D.points+=r.pts||100;save();showCel(r.icon||'🏆',r.name,'',r.pts||100);confetti();}
  });
}
function renderRewards(){
  const container=document.getElementById('rwd-container');if(!container)return;
  const all=D.rewards||[];
  const achieved=all.filter(r=>r.achieved).length;
  const cnt=document.getElementById('rwd-cnt');if(cnt)cnt.textContent=`${achieved}/${all.length}`;

  // Build course milestone rewards section
  const courseRewards=[];
  (D.courses||[]).forEach(c=>{
    [25,50,75,100].forEach(pct=>{
      const rw=c.rewards?.[`r${pct}`];if(!rw)return;
      const target=Math.round(c.total*pct/100);
      const reached=c.done>=target;
      courseRewards.push({courseName:c.name,courseIcon:c.icon||'📚',courseColor:c.color||'var(--blue)',pct,reward:rw,reached,target,done:c.done});
    });
  });

  let courseSection='';
  if(courseRewards.length>0){
    courseSection=`<div class="section-divider">مكافآت الكورسات</div>`+
    courseRewards.map(cr=>`<div class="reward-card ${cr.reached?'unlocked':'locked'}" style="--c-glow:${cr.courseColor}22">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:36px;flex-shrink:0">${cr.reached?'✅':'🔒'}</div>
        <div style="flex:1">
          <div class="reward-title">${cr.reward}</div>
          <div class="reward-cond">${cr.courseIcon} ${cr.courseName} — عند ${cr.pct}% (${cr.done}/${cr.target})</div>
          <div style="margin-top:4px;font-size:12px;color:${cr.reached?'var(--gold)':'var(--dim)'}">${cr.reached?'🎉 تم تحقيقها!':'🔒 لم تُفتح بعد'}</div>
        </div>
        <div style="background:${cr.courseColor}22;color:${cr.courseColor};border-radius:10px;padding:5px 10px;font-family:Space Grotesk;font-weight:700;font-size:13px;flex-shrink:0">${cr.pct}%</div>
      </div></div>`).join('');
  }

  if(all.length===0&&courseRewards.length===0){container.innerHTML=`<div class="empty-state"><div class="empty-ico">🎯</div><div class="empty-txt">مفيش مكافآت لسه</div><div class="empty-sub">اضغط الزرار في الأسفل لتضيف أول مكافأة</div></div><div style="height:80px"></div>`;return;}
  const sorted=[...all].sort((a,b)=>(b.achieved?1:0)-(a.achieved?1:0));
  let myRewardsSection='';
  if(sorted.length>0){
    myRewardsSection=`<div class="section-divider">مكافآتي الشخصية</div>`+

  }

function getCondLabel(r){

  if(r.condType==='course_pct'){const c=(D.courses||[]).find(x=>x.id===r.condRef);return`📚 إتمام${c?' — '+c.name:''} ${r.condValue}%`;}
  if(r.condType==='gym_attend')return`💪 حضور الجيم ${r.condValue} يوم في الشهر`;

// ═══════════════════════ CHART ═══════════════════════
function drawProgressChart(){
  const canvas=document.getElementById('progress-chart');if(!canvas)return;
  const dpr=window.devicePixelRatio||1,w=canvas.parentElement.clientWidth-28,h=140;
  canvas.style.width=w+'px';canvas.style.height=h+'px';canvas.width=w*dpr;canvas.height=h*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const isLight=D.theme==='light';const history=D.prayers.history||{};
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const key=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;let cnt=history[key]||0;if(i===0)cnt=D.prayers.today.filter(Boolean).length;days.push({label:DAY_NAMES_SHORT[d.getDay()],prayers:cnt});}
  const pad={t:20,r:8,b:34,l:8},chartW=w-pad.l-pad.r,chartH=h-pad.t-pad.b,barW=(chartW/7)*.55,barGap=chartW/7;
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<=5;i++){const y=pad.t+chartH-(chartH/5)*i;ctx.strokeStyle=isLight?'rgba(26,32,64,0.06)':'rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();}
  days.forEach((d,i)=>{
    const x=pad.l+i*barGap+(barGap-barW)/2,barH=d.prayers===0?2:(d.prayers/5)*chartH,y=pad.t+chartH-barH,isToday=i===6;
    const grad=ctx.createLinearGradient(0,y,0,pad.t+chartH);
    if(d.prayers===5){grad.addColorStop(0,'#3dd68c');grad.addColorStop(1,'rgba(61,214,140,0.2)');}
    else if(d.prayers>0){grad.addColorStop(0,isLight?'#d4a000':'#f5c842');grad.addColorStop(1,'rgba(245,200,66,0.2)');}
    else{grad.addColorStop(0,isLight?'rgba(107,122,154,0.2)':'rgba(90,101,128,0.25)');grad.addColorStop(1,'transparent');}
    ctx.fillStyle=grad;const r=Math.min(5,barW/2);
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+barW-r,y);ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);ctx.lineTo(x+barW,pad.t+chartH);ctx.lineTo(x,pad.t+chartH);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();
    if(isToday){ctx.strokeStyle=isLight?'#d4a000':'#f5c842';ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle=isToday?(isLight?'#d4a000':'#f5c842'):(isLight?'rgba(107,122,154,0.9)':'rgba(90,101,128,0.9)');
    ctx.font=`${isToday?700:400} 10px Tajawal,sans-serif`;ctx.textAlign='center';ctx.fillText(d.label,x+barW/2,pad.t+chartH+14);
    if(d.prayers>0){ctx.fillStyle=d.prayers===5?'#3dd68c':(isLight?'#d4a000':'#f5c842');ctx.font='bold 9px Space Grotesk,sans-serif';ctx.textAlign='center';ctx.fillText(d.prayers+'/5',x+barW/2,y-4);}
  });
  ctx.fillStyle=isLight?'rgba(107,122,154,0.7)':'rgba(90,101,128,0.8)';ctx.font='10px Tajawal';ctx.textAlign='right';ctx.fillText('صلوات آخر 7 أيام',w-pad.r,pad.t-6);
}

// ═══════════════════════ EMAIL / PASSWORD ═══════════════════════
async function authSubmit(){
  if(!firebaseReady){showAuthErr(' Firebase Config ⚙️');return;}
  const email=document.getElementById('auth-email').value.trim().toLowerCase();
  const pass=document.getElementById('auth-pass').value;
  const name=document.getElementById('auth-name').value.trim();
  if(!email||!email.includes('@')){showAuthErr('أدخل بريد إلكتروني صحيح');return;}
  if(!pass||pass.length<6){showAuthErr('كلمة السر لازم تكون 6 أحرف على الأقل');return;}
  setAuthLoading(true);
  try{
    let cred;
    if(authMode==='signup'){
      if(!name){showAuthErr('أدخل اسمك');setAuthLoading(false);return;}
      cred=await auth.createUserWithEmailAndPassword(email,pass);
      await cred.user.updateProfile({displayName:name});
    }else{
      cred=await auth.signInWithEmailAndPassword(email,pass);
    }
    afterFirebaseAuth(cred.user);
  }catch(e){showAuthErr(firebaseErrMsg(e.code));}
  finally{setAuthLoading(false);}
}

}
